# This is a configuration file assuming the availability of an 80GiB GPU (A100 or H100).
# If you want to perform ensemble at each generation step, please ensure that the 'priority' for all models is set to 'supportive'. The threshold will be ignored.
# This config enables CoRE (Harnessing Consistency for Robust Test-Time LLM Ensemble) on top of GaC.
NORM_TYPE_API_SERVER: 'average' # 'average' or 'score'. With CoRE the per-model weights are recomputed from consistency, so these weights are superseded (they still pick the anchor model by score when CORE_MAIN_INDEX is unset).
THRESHOLD_API_SERVER: 1.0
ENSEMBLE_METHOD: 'gac' # CoRE augments the union-vocab GaC path. Must be 'gac' (or omitted); 'unite' is rejected with USE_CORE.

# ---- CoRE settings ----
USE_CORE: true # Enable GaC + CoRE. Default false -> identical to vanilla GaC.
CORE_VARIANT: 'consist-rbf' # token consistency function: consist-rbf | consist-power | consist-sig | consist-linear | consist-rec
CORE_TASK_TYPE: 'generation' # 'generation' (token consistency on assists + sum(token_score)/entropy weights) or 'classification' (1/entropy weights, no token-consistency filter)
# CORE_MAIN_INDEX: 0 # optional: explicit anchor ("main") model index. If unset: gate model when present, else the model with the highest raw 'score' (ties -> first).
CORE_CHECK_SUBSTRING: true # generation only: if the ensemble token and the anchor's top token are prefixes of each other, keep the anchor token.
# Consistency-function hyperparameters (paper defaults shown):
CORE_BETA: 2.0   # consist-rbf
CORE_ALPHA: 5.0  # consist-power
CORE_GAMMA: 1.0  # consist-rec
CORE_K: 5.0      # consist-sig

CONFIG_API_SERVER:
  - weight: '/ssd4/Models/Qwen3-32B'
    max_memory:
      0: '80GiB'
    num_gpus: 1
    name: 'Qwen3-32B'
    score: 100 # highest score -> CoRE anchor ("main") model when CORE_MAIN_INDEX is unset
    priority: 'supportive'
    quantization: 'none'

  - weight: '/ssd4/Models/DeepSeek-R1-Distill-Qwen-32B'
    max_memory:
      0: '80GiB'
    num_gpus: 1
    name: 'DeepSeek-R1-Distill-Qwen-32B'
    score: 100
    priority: 'supportive'
    quantization: 'none'

  - weight: '/ssd4/Models/GLM-4-32B-0414'
    max_memory:
      0: '80GiB'
    num_gpus: 1
    name: 'GLM-4-32B-0414'
    score: 100
    priority: 'supportive'
    quantization: 'none'
