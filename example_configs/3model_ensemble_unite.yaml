# This is a configuration file assuming the availability of an 80GiB GPU (A100 or H100).
# If you want to perform ensemble at each generation step, please ensure that the 'priority' for all models is set to 'supportive'. The threshold will be ignored.
# This config selects the UniTE algorithm instead of the default GaC.
NORM_TYPE_API_SERVER: 'average' # 'average' or 'score', 'score' means each model's output vector in the ensemble is weighted by its score divided by the total score.
THRESHOLD_API_SERVER: 1.0
ENSEMBLE_METHOD: 'unite' # 'gac' (default) or 'unite'. UniTE ensembles only the union of each model's top-k tokens.
UNITE_TOP_K: 10 # top-k used by UniTE per model (ignored by GaC).
UNITE_RENORM: true # true (default): faithful UniTE — each model is renormalized over the candidate set then combined as a weighted average. false: sum absolute model-weighted probs over the candidate set (GaC-like, keeps each model's confidence).
CONFIG_API_SERVER:
  - weight: '/ssd4/Models/Qwen3-32B'
    max_memory:
      0: '80GiB'
    num_gpus: 1
    name: 'Qwen3-32B'
    score: 100
    priority: 'supportive'
    quantization: 'none'

  - weight: '/ssd4/Models/DeepSeek-R1-Distill-Qwen-32B'
    max_memory:
      0: '80GiB'
    num_gpus: 1
    name: 'DeepSeek-R1-Distill-Qwen-32B'
    score: 100
    priority: 'supportive'
    quantization: 'none'

  - weight: '/ssd4/Models/GLM-4-32B-0414'
    max_memory:
      0: '80GiB'
    num_gpus: 1
    name: 'GLM-4-32B-0414'
    score: 100
    priority: 'supportive'
    quantization: 'none'
